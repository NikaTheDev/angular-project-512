<header>
  <div class="container flex-row">
    <app-logo></app-logo>
    <app-nav></app-nav>
    <div class="user-container flex-row">
      <button class="cartBtn flex-row" routerLink="/cart">
        <img src="/assets/icons/cart.svg" alt="" />
      </button>
      <button class="signBtn flex-row" routerLink="/auth">
        <img src="/assets/icons/user.svg" alt="" />
      </button>
      <button class="burgerBtn flex-row" (click)="menuToggle()" [class.openedMenu]="isMenuOpen()">
        <img [src]="isMenuOpen() ? '/assets/icons/close.svg' : '/assets/icons/menu.svg'" alt="" />
      </button>
    </div>
  </div>
</header>

<app-mobile-nav [class.open]="isMenuOpen()" (isClicked)="menuToggle()"></app-mobile-nav>
