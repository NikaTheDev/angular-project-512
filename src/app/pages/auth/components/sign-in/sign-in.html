<h2>Sign In</h2>

<form (ngSubmit)="onSubmit()" #signInForm="ngForm">
  <input
    type="email"
    placeholder="Enter email"
    name="email"
    [(ngModel)]="signInData.email"
    #emailInput="ngModel"
    required
    email
  />
  @if (emailInput.invalid && emailInput.touched) {
    <span>enter email</span>
  }
  <input
    type="password"
    placeholder="Enter password"
    name="password"
    [(ngModel)]="signInData.password"
    required
    minlength="6"
    #passwordInput="ngModel"
  />
  @if (passwordInput.hasError('required') && passwordInput.touched) {
    <span>enter password</span>
  }
  @if (passwordInput.hasError('minlength') && passwordInput.touched) {
    <span>password is too short</span>
  }

  <button>Sign In</button>
</form>
