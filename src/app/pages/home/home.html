<h2>Main Page</h2>

<section class="flex-row">
  @if (productsList()) {
    @for (item of productsList().products; track item._id) {
      <app-product-card [product]="item"></app-product-card>
    }
  }
  <div>
    <button (click)="prevPage()">prev</button>
    <span>{{ pageIndex() }}</span>
    <button (click)="nextPage()">next</button>
  </div>
</section>
