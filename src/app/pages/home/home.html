<section class="products-section">
  <div class="container">
    <div class="section-header">
      <div>
        <h2>Our Best Products</h2>
      </div>
    </div>

    @if (productsList()) {
      <div class="products-grid">
        @for (item of productsList().products; track item._id) {
          <app-product-card [product]="item"></app-product-card>
        }
      </div>

      <div class="pagination">
        <button type="button" (click)="prevPage()" [disabled]="pageIndex() === 1">Prev</button>

        <span>Page {{ pageIndex() }}</span>

        <button
          type="button"
          (click)="nextPage()"
          [disabled]="pageIndex() * pageSize() >= productsList().total"
        >
          Next
        </button>
      </div>
    } @else {
      <p class="loading-text">Loading products...</p>
    }
  </div>
</section>
